<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ansh Oswal — Digital Card</title>
<meta name="description" content="Ansh Pritam Oswal's digital business card — save contact, connect, and explore." />
<meta name="theme-color" content="#05070d" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#05070d; --card:rgba(255,255,255,0.05); --stroke:rgba(255,255,255,0.11);
    --text:#eef2fb; --muted:#9aa6c0; --accent:#22d3ee; --accent-2:#6366f1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
  .aurora{position:fixed;inset:0;z-index:0;overflow:hidden}
  .aurora::before,.aurora::after{content:"";position:absolute;width:80vw;height:80vw;border-radius:50%;filter:blur(120px);opacity:.5}
  .aurora::before{background:radial-gradient(circle,#22d3ee,transparent 60%);top:-30%;left:-30%;animation:f1 16s ease-in-out infinite}
  .aurora::after{background:radial-gradient(circle,#6366f1,transparent 60%);bottom:-30%;right:-30%;animation:f2 20s ease-in-out infinite}
  @keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(10vw,8vh)}}
  @keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-8vw,-10vh)}}

  .card{position:relative;z-index:1;width:100%;max-width:420px;background:rgba(10,14,26,0.72);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid var(--stroke);border-radius:30px;padding:34px 26px 28px;
    box-shadow:0 30px 80px rgba(0,0,0,0.55),0 0 60px rgba(34,211,238,0.10);
    text-align:center;animation:rise .7s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:none}}

  .avatar-ring{width:118px;height:118px;margin:0 auto 18px;border-radius:50%;padding:3px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 34px rgba(34,211,238,0.4)}
  .avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:3px solid #0a0e1a}
  h1{font-family:'Sora',sans-serif;font-weight:800;font-size:27px;letter-spacing:-0.02em;margin-bottom:6px}
  .title{color:var(--accent);font-weight:600;font-size:14px}
  .sub{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5}

  .primary{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin:24px 0 8px;
    padding:16px;border:none;border-radius:16px;cursor:pointer;
    font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:#05070d;
    background:linear-gradient(120deg,var(--accent),var(--accent-2));
    box-shadow:0 10px 30px rgba(34,211,238,0.35);transition:transform .15s,box-shadow .2s}
  .primary:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(34,211,238,0.5)}
  .primary:active{transform:translateY(0)}

  .links{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
  .link{display:flex;align-items:center;gap:11px;padding:14px 15px;border-radius:15px;
    background:var(--card);border:1px solid var(--stroke);text-decoration:none;color:var(--text);
    font-weight:600;font-size:14px;transition:transform .15s,border-color .2s,background .2s}
  .link:hover{transform:translateY(-2px);border-color:var(--accent)}
  .link.full{grid-column:1 / -1}
  .ic{width:34px;height:34px;flex:0 0 34px;border-radius:10px;display:grid;place-items:center;
    background:rgba(255,255,255,0.06)}
  .ic svg{width:18px;height:18px;fill:var(--text)}

  .foot{margin-top:20px;color:var(--muted);font-size:11.5px;letter-spacing:.02em}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:#0f1526;border:1px solid var(--stroke);color:var(--text);padding:12px 20px;border-radius:999px;
    font-size:13.5px;opacity:0;pointer-events:none;transition:.3s;z-index:5}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="aurora"></div>

  <main class="card">
    <div class="avatar-ring"><img src="assets/profile.jpg" alt="Ansh Pritam Oswal" /></div>
    <h1>Ansh Pritam Oswal</h1>

    <button class="primary" id="saveBtn">

      Add to Contacts
    </button>

    <div class="links">

        <span class="ic"><svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg></span>

        <span class="ic"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm6.93 6h-2.95a15.6 15.6 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.93 8zM12 4c.83 1.2 1.48 2.53 1.91 4h-3.82c.43-1.47 1.08-2.8 1.91-4zM4.26 14a7.96 7.96 0 0 1 0-4h3.38a16.6 16.6 0 0 0 0 4H4.26zm.81 2h2.95c.35 1.27.82 2.47 1.38 3.56A8.03 8.03 0 0 1 5.07 16zm2.95-8H5.07a8.03 8.03 0 0 1 4.33-3.56A15.6 15.6 0 0 0 8.02 8zM12 20c-.83-1.2-1.48-2.53-1.91-4h3.82A13.9 13.9 0 0 1 12 20zm2.36-6H9.64a14.7 14.7 0 0 1 0-4h4.72a14.7 14.7 0 0 1 0 4zm.62 5.56c.56-1.09 1.03-2.29 1.38-3.56h2.95a8.03 8.03 0 0 1-4.33 3.56zM16.36 14a16.6 16.6 0 0 0 0-4h3.38a7.96 7.96 0 0 1 0 4h-3.38z"/></svg></span>
        Website
      </a>
      <a class="link" href="mailto:ansh.p.oswal.29@dartmouth.edu">
        <span class="ic"><svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg></span>

    <div class="foot">Tap “Add to Contacts” — no app needed · anshoswal.vercel.app</div>
  </main>

  <div class="toast" id="toast">Contact card downloaded ✓</div>

  <script>
    // Self-contained vCard 3.0 — works offline, no server needed.
    const VCARD = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      "N:Oswal;Ansh;Pritam;;",
      "FN:Ansh Pritam Oswal",
      "TITLE:Math & Decision Science @ Dartmouth '29",
      "ORG:Dartmouth College",
      "EMAIL;TYPE=INTERNET:ansh.p.oswal.29@dartmouth.edu",
      "TEL;TYPE=CELL:+6582054457",
      "URL:https://anshoswal.vercel.app",
      "X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/ansh-pritam-oswal",
      "X-SOCIALPROFILE;TYPE=github:https://github.com/anshposwal29",
      "NOTE:Insurance AI & Underwriting | ML Research",
      "END:VCARD"
    ].join("\r\n");

    document.getElementById('saveBtn').addEventListener('click', () => {
      const blob = new Blob([VCARD], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = "Ansh_Oswal.vcf";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      const t = document.getElementById('toast');
      t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2600);
    });
  </script>
</body>
</html>
