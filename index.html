<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ansh Oswal — Digital Card</title>
<meta name="description" content="Ansh Pritam Oswal's digital card — save my contact, or find me online." />
<meta name="theme-color" content="#0e1116" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0e1116; --panel:#12151c; --panel-2:rgba(255,255,255,0.04);
    --line:rgba(255,255,255,0.09); --line-2:rgba(255,255,255,0.15);
    --text:#e9ecf1; --text-soft:#c3c9d4; --muted:#8b93a3;
    --accent:#56cfe1; --accent-2:#7c86f0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(124,134,240,0.08), transparent 62%),
      radial-gradient(700px 420px at 6% 2%, rgba(86,207,225,0.06), transparent 60%),
      var(--bg);
    background-attachment:fixed;
    color:var(--text); font-family:'Inter',system-ui,sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:24px; -webkit-font-smoothing:antialiased;
  }

  .card{
    width:100%; max-width:412px; background:var(--panel);
    border:1px solid var(--line); border-radius:22px; padding:32px 26px 26px;
    box-shadow:0 24px 60px rgba(0,0,0,0.45); text-align:center;
    animation:rise .6s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .avatar-ring{
    width:104px; height:104px; margin:0 auto 18px; border-radius:50%;
    padding:2px; background:linear-gradient(150deg, rgba(86,207,225,0.5), rgba(124,134,240,0.5));
  }
  .avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:3px solid var(--panel)}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:26px;letter-spacing:-0.01em;margin-bottom:7px}
  .title{color:var(--accent);font-weight:600;font-size:14px}
  .sub{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5}

  .primary{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin:24px 0 8px;
    padding:15px;border:1px solid var(--text);border-radius:14px;cursor:pointer;
    font-family:'Inter',sans-serif;font-weight:600;font-size:15.5px;color:var(--bg);
    background:var(--text);transition:background .18s,transform .15s;
  }
  .primary:hover{background:#fff;transform:translateY(-1px)}
  .primary:active{transform:translateY(0)}
  .primary svg{fill:var(--bg)}

  .links{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .link{
    display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:13px;
    background:var(--panel-2);border:1px solid var(--line);text-decoration:none;color:var(--text);
    font-weight:600;font-size:14px;transition:border-color .18s,color .18s;
  }
  .link:hover{border-color:var(--accent);color:var(--accent)}
  .link:hover .ic svg{fill:var(--accent)}
  .link.full{grid-column:1 / -1}
  .ic{width:32px;height:32px;flex:0 0 32px;border-radius:9px;display:grid;place-items:center;background:rgba(255,255,255,0.05)}
  .ic svg{width:17px;height:17px;fill:var(--text-soft);transition:fill .18s}

  .foot{margin-top:20px;color:var(--muted);font-size:11.5px;letter-spacing:.02em}
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:#161a22;border:1px solid var(--line-2);color:var(--text);padding:11px 20px;border-radius:999px;
    font-size:13.5px;opacity:0;pointer-events:none;transition:.28s;z-index:5;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>
<body>

  <div class="toast" id="toast">Contact card downloaded ✓</div>

  <script>
    // Self-contained vCard 3.0 — works offline, no server needed.
    const VCARD = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      "N:Oswal;Ansh;Pritam;;",
      "FN:Ansh Pritam Oswal",
      "TITLE:Math & Decision Science @ Dartmouth '29",
      "ORG:Dartmouth College",
      "EMAIL;TYPE=INTERNET:ansh.p.oswal.29@dartmouth.edu",
      "TEL;TYPE=CELL:+6582054457",
      "URL:https://anshposwal.vercel.app",
      "X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/ansh-pritam-oswal",
      "X-SOCIALPROFILE;TYPE=github:https://github.com/anshposwal29",
      "NOTE:Insurance AI & underwriting | ML research",
      "END:VCARD"
    ].join("\r\n");

    document.getElementById('saveBtn').addEventListener('click', () => {
      const blob = new Blob([VCARD], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = "Ansh_Oswal.vcf";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      const t = document.getElementById('toast');
      t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2600);
    });
  </script>
</body>
</html>
